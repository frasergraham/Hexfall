<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0d0f1c" />
    <title>Hex Rain</title>
    <script type="module" crossorigin src="/assets/index-CRoSqYFy.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CjQBO5Ku.css">
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <div class="hud-left">
          <button
            id="pauseBtn"
            class="pause-btn"
            type="button"
            aria-label="Pause"
            hidden
          >
            <span class="pause-bars" aria-hidden="true"></span>
          </button>
          <span id="score" class="value">0</span>
        </div>
        <div class="hud-right">
          <span class="label">BEST</span>
          <span id="best" class="value">0</span>
        </div>
      </header>

      <main class="stage">
        <canvas id="game"></canvas>

        <div id="controlsHint" class="controls-hint" hidden aria-hidden="true">
          <kbd>A</kbd>/<kbd>&larr;</kbd> <kbd>D</kbd>/<kbd>&rarr;</kbd> move
          &middot;
          <kbd>Q</kbd>/<kbd>E</kbd> rotate
          &middot;
          <kbd>P</kbd> pause
        </div>

        <div
          id="canvasWheel"
          class="canvas-wheel"
          aria-hidden="true"
        >
          <div id="canvasKnob" class="canvas-knob"></div>
        </div>

        <div id="overlay" class="overlay">
          <h1>HEX RAIN</h1>
          <p class="tagline">Move. Rotate. Survive.</p>
          <div class="play-group">
            <div id="difficultyButtons" class="difficulty-buttons" role="group" aria-label="Difficulty">
              <button type="button" data-difficulty="easy" aria-pressed="false">EASY</button>
              <button type="button" data-difficulty="medium" aria-pressed="true">MEDIUM</button>
              <button type="button" data-difficulty="hard" aria-pressed="false">HARD</button>
              <button type="button" data-difficulty="hardcore" aria-pressed="false">PAINFUL</button>
            </div>
            <button type="button" class="play-btn" data-action="play">PLAY</button>
          </div>
          <div class="challenge-group">
            <button type="button" class="play-btn play-btn-secondary" data-action="challenges">CHALLENGES</button>
            <button type="button" class="play-btn play-btn-secondary" data-action="challenge-editor">CHALLENGE EDITOR</button>
          </div>
          <section class="achievements">
            <h2>Achievements <span id="achievementCount" class="achievement-count" aria-live="polite"></span></h2>
            <div id="achievementBadges" class="achievement-badges" aria-label="Earned achievements"></div>
          </section>
          <div class="menu-footer">
            <div class="audio-toggles" role="group" aria-label="Audio">
              <button type="button" class="audio-toggle" data-action="toggle-sfx" aria-pressed="true">SFX</button>
              <button type="button" class="audio-toggle" data-action="toggle-music" aria-pressed="true">MUSIC</button>
              <button type="button" class="audio-toggle" data-action="open-blocks">BLOCKS</button>
            </div>
            <button type="button" class="reset-hints" data-action="reset-hints">Hints</button>
            <a class="credits-link" href="./credits/index.html">Credits</a>
          </div>
        </div>
      </main>

      <nav id="touchbar" class="touchbar" aria-hidden="true">
        <div
          id="movepad"
          class="movepad"
          role="slider"
          aria-label="Move (touch and slide)"
          aria-valuemin="-1"
          aria-valuemax="1"
          aria-valuenow="0"
        >
          <div class="movepad-track"></div>
          <div id="moveknob" class="moveknob"></div>
        </div>
      </nav>
    </div>

    <script
      data-goatcounter="https://twistedweasel.goatcounter.com/count"
      async
      src="https://gc.zgo.at/count.js"
    ></script>
  </body>
</html>
