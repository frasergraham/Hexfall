<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0d0f1c" />
    <title>Hexfall</title>
    <script type="module" crossorigin src="/Hexfall/assets/index-DkLXFlP0.js"></script>
    <link rel="stylesheet" crossorigin href="/Hexfall/assets/index-Dw-TQf97.css">
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <div class="hud-left">
          <span class="label">SCORE</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="hud-right">
          <span class="label">BEST</span>
          <span id="best" class="value">0</span>
        </div>
      </header>

      <main class="stage">
        <canvas id="game"></canvas>

        <div id="overlay" class="overlay">
          <h1>HEXFALL</h1>
          <p class="tagline">Move. Rotate. Survive.</p>
          <p class="hint desktop-only">
            <kbd>A</kbd>/<kbd>&larr;</kbd> <kbd>D</kbd>/<kbd>&rarr;</kbd> move
            &nbsp;&middot;&nbsp; <kbd>Q</kbd>/<kbd>E</kbd> rotate
            &nbsp;&middot;&nbsp; <kbd>P</kbd> pause
          </p>
          <p class="hint">Press <kbd>Space</kbd> or tap to start</p>
        </div>
      </main>

      <nav id="touchbar" class="touchbar" aria-hidden="true">
        <div
          id="rotatepad"
          class="rotatepad"
          role="slider"
          aria-label="Rotate (touch and drag)"
          aria-valuemin="-180"
          aria-valuemax="180"
          aria-valuenow="0"
        >
          <div class="rotatepad-ring"></div>
          <div id="rotateknob" class="rotateknob"></div>
        </div>
        <div
          id="movepad"
          class="movepad"
          role="slider"
          aria-label="Move (touch and slide)"
          aria-valuemin="-1"
          aria-valuemax="1"
          aria-valuenow="0"
        >
          <div class="movepad-track"></div>
          <div id="moveknob" class="moveknob"></div>
        </div>
      </nav>
    </div>

  </body>
</html>
